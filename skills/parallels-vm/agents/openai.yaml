interface:
  display_name: "Parallels VM"
  short_description: "Control Parallels VMs with prlctl plus macOS, Linux, and native Windows guest wrappers for OpenClaw website installs, release smoke runs, update verification, onboarding probes, gateway probing, and native Windows embedded-agent hatch checks."
  default_prompt: "Use $parallels-vm to automate or inspect Parallels Desktop VMs on Peter's Mac. Prefer prlctl first, choose `prl-macos-*` for macOS guests, `prl-linux-*` for Linux guests, and `prl-windows-*` for native Windows guests. Use the bundled wrappers for OpenClaw release smoke from openclaw.ai and gateway verification, rely on the Windows installer/user-local portable Git path to avoid admin prompts, wait for `prlctl exec --current-user whoami` after Windows boots, treat `NT AUTHORITY\\\\SYSTEM` from plain guest exec plus black reboot screenshots as \"guest awake, desktop user not ready yet\", use host-served cache-busted tgz files for pre-release Windows update tests, prefer isolated Windows `--prefix` installs for host-served tgz smoke because they avoid stale `%APPDATA%\\\\npm` trees and missing `openclaw.cmd` shims, prefer the built-in skip-reinstall fast path in `prl-windows-openclaw-update-verify.sh` for repeat runs, use `prl-windows-overlay-openclaw.sh` only when you intentionally want to reuse an existing global install tree, do not trust raw unpacked tgz execution on Windows because it can miss runtime deps, verify native Windows OpenAI with `prl-windows-onboard-verify.sh --hatch` or `prl-windows-openclaw.sh ... agent --local --agent main`, use `prl-windows-onboard-verify.sh` when the question is specifically about native onboarding, treat embedded hatch and gateway service as separate checks, remember that no-daemon onboarding health failures are expected without a running gateway, surface concrete `schtasks` failures as the native Windows daemon-install blocker, use the encoded PowerShell wrapper path instead of raw host-shell `powershell -Command \"$...\"` when guest `$env:` variables matter, prefer prefix-backed `prl-windows-openclaw.sh` runs when Parallels `--current-user` is flaky, fall back to detached manual gateway probes when service/bootstrap paths are broken, use guest-native control second, and Peekaboo only when host-side GUI automation is required."
